services:
  postgres:
    image: postgres:16-alpine
    container_name: mob-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mob
      POSTGRES_USER: mob_admin
      POSTGRES_PASSWORD: localdev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mob_admin -d mob"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mob-dev

volumes:
  postgres_data:

networks:
  mob-dev:
    name: mob-dev
