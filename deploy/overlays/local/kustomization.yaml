apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mob

resources:
  - ../../base

commonLabels:
  app.kubernetes.io/instance: local

patches:
  # Scale API to 0 — local mode doesn't need the API in K8s
  - path: patches/deployment.yaml
  # Scale LiteLLM to 0 — not supported in local mode
  - path: patches/litellm-deployment.yaml
