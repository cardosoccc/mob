apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mob-api
  namespace: mob
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  tls:
    - hosts:
        - mob.example.com
      secretName: mob-prod-tls
  rules:
    - host: mob.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mob-api
                port:
                  number: 8080
