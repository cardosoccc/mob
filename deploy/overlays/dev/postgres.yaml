# Headless service + Endpoints to route to the Docker Compose PostgreSQL
# container on the shared mob-dev Docker network.
# The Endpoints IP is populated by scripts/dev-setup.sh at deploy time.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: mob
  labels:
    app.kubernetes.io/name: mob
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Endpoints
metadata:
  name: postgres
  namespace: mob
subsets:
  - addresses:
      # Placeholder — replaced by dev-setup.sh with the actual container IP
      - ip: "127.0.0.1"
    ports:
      - port: 5432
