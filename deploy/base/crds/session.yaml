apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sessions.mob.io
spec:
  group: mob.io
  names:
    kind: Session
    listKind: SessionList
    plural: sessions
    singular: session
    shortNames:
      - sess
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - agentId
                - agentName
                - agentTemplate
              properties:
                agentId:
                  type: string
                agentName:
                  type: string
                agentTemplate:
                  type: string
                systemPrompt:
                  type: string
                modelEndpoint:
                  type: string
                taskId:
                  type: string
            status:
              type: object
              properties:
                state:
                  type: string
                podName:
                  type: string
                errorMessage:
                  type: string
                lastTransitionTime:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: State
          type: string
          jsonPath: .status.state
        - name: Agent
          type: string
          jsonPath: .spec.agentName
        - name: Pod
          type: string
          jsonPath: .status.podName
