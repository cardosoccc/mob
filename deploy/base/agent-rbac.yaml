apiVersion: v1
kind: ServiceAccount
metadata:
  name: mob-agent
  namespace: mob
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mob-agent-self-annotate
  namespace: mob
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mob-agent-self-annotate
  namespace: mob
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mob-agent-self-annotate
subjects:
  - kind: ServiceAccount
    name: mob-agent
    namespace: mob
