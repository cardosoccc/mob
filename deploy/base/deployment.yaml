apiVersion: apps/v1
kind: Deployment
metadata:
  name: mob-api
  namespace: mob
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: mob
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mob
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: mob-operator
      containers:
        - name: mob-api
          image: mob-api:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: mob-config
            - secretRef:
                name: mob-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
