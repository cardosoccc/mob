kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: mob-local
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # API access via localhost:8080
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      # PostgreSQL access via localhost:5432
      - containerPort: 30432
        hostPort: 5432
        protocol: TCP
